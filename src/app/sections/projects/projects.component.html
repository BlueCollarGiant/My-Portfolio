<section id="projects" class="container">
  <h2 class="section-title">Featured Projects</h2>
  <div class="grid projects">
    <article class="card" *ngFor="let p of projectsSvc.projects()">
      <h3 class="title">{{ p.title }}</h3>
      <p class="blurb">{{ p.blurb }}</p>
      <div class="tags">
        <span class="tag" *ngFor="let t of p.tech">{{ t }}</span>
      </div>
      <div class="go">
        <a class="btn" [href]="p.liveUrl" target="_blank" rel="noopener noreferrer"
           aria-label="Open {{p.title}} live site">Open Live</a>
      </div>
    </article>
  </div>
</section>
